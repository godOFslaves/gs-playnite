on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

name: Release Build

env:
  PLAYNITE_VERSION: "10.34"
  PLAYNITE_ZIP: "Playnite1034.zip"

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout powershell-yaml
        uses: actions/checkout@v4
        with:
          repository: cloudbase/powershell-yaml
          path: powershell-yaml

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: NuGet Restore
        run: nuget restore .\GsPlugin.sln

      # Code formatting is enforced by the pre-commit hook (dotnet format --verify-no-changes).
      # CI cannot run dotnet format on this solution because the .NET 8 SDK on windows-2022
      # is missing BuildHost-net472, which is required to load old-style .NET Framework .csproj
      # files (including transitively via ProjectReference from the SDK-style test project).

      - name: Build Entire Solution (.NET Framework 4.6.2)
        run: msbuild $Env:GITHUB_WORKSPACE\GsPlugin.sln -p:Configuration=Release -restore -clp:ErrorsOnly

      - name: Run Tests
        run: dotnet test GsPlugin.Tests\GsPlugin.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Setup Playnite
        run: |
          Invoke-WebRequest -Uri "https://github.com/JosefNemec/Playnite/releases/download/${{ env.PLAYNITE_VERSION }}/${{ env.PLAYNITE_ZIP }}" -OutFile "$Env:GITHUB_WORKSPACE\Playnite.zip"
          Expand-Archive "$Env:GITHUB_WORKSPACE\Playnite.zip" -DestinationPath "$Env:GITHUB_WORKSPACE\Playnite"

      - name: Pack with Playnite
        id: pack
        run: |
          mkdir "PackingOutput"
          & "$Env:GITHUB_WORKSPACE\Playnite\Toolbox.exe" pack "$Env:GITHUB_WORKSPACE\bin\Release" "$Env:GITHUB_WORKSPACE\PackingOutput"
          Get-ChildItem "$Env:GITHUB_WORKSPACE\PackingOutput" -Filter *.pext | Rename-Item -NewName ("GsPlugin_" + "${{ github.ref_name }}".Replace("/", "_") + ".pext")
          Move-Item -Path "$Env:GITHUB_WORKSPACE\PackingOutput\*.pext" -Destination $Env:GITHUB_WORKSPACE

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Create Sentry Release
        if: ${{ steps.release.outputs.release_created }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: game-scrobbler
          SENTRY_PROJECT: gs-playnite
        run: |
          npm install -g @sentry/cli
          $version = "${{ steps.release.outputs.tag_name }}".TrimStart('v')
          sentry-cli releases new "GsPlugin@$version"
          sentry-cli releases set-commits "GsPlugin@$version" --auto
          sentry-cli upload-dif --type=portablepdb "$Env:GITHUB_WORKSPACE\bin\Release" --log-level=info
          sentry-cli releases finalize "GsPlugin@$version"

      - name: Rename Packed File Name to Release Tag
        if: ${{ steps.release.outputs.release_created }}
        id: rename
        run: |
          Get-ChildItem "$Env:GITHUB_WORKSPACE" -Filter *.pext | Rename-Item -NewName ("${{ steps.release.outputs.tag_name }}".Replace("/", "_") + ".pext")

      - name: Upload Release Artifact
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: gh release upload ${{ steps.release.outputs.tag_name }} .\${{ steps.release.outputs.tag_name }}.pext

      - name: Update Installer Manifest
        if: ${{ steps.release.outputs.release_created }}
        run: |
          $version = "${{ steps.release.outputs.tag_name }}".Replace("GsPlugin-v", "")
          Write-Host "Updating installer manifest for version $version"
          powershell -ExecutionPolicy Bypass -File "$Env:GITHUB_WORKSPACE\scripts\update-installer-manifest.ps1" -Version $version -TagName "${{ steps.release.outputs.tag_name }}"

      - name: Commit and Push Manifest Changes
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add installer_manifest.yaml
          git diff --cached --quiet || git commit -m "chore: update installer_manifest.yaml for ${{ steps.release.outputs.tag_name }}"
          git push
